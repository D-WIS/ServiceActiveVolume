# Default values for norcedrillingactivevolumewebappclient.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1
image:
  repository: digiwells/norcedrillingactivevolumewebappclient
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "stable"
imagePullSecrets: []
nameOverride: "norcedrillingactivevolumewebappclient"
fullnameOverride: "norcedrillingactivevolumewebappclient"
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
service:
  type: ClusterIP
  port: 80
  annotations:
    description: "A webapp client for handling ActiveVolume calibration"
env:
  BasePath: "/activevolume/webapp"
  ActiveVolumeCalibrationHostURL: "http://norcedrillingactivevolumecalibrationservice/"
  FieldHostURL: "http://norcedrillingfieldservice/"
  ClusterHostURL: "http://norcedrillingclusterservice/"
  WellHostURL: "http://norcedrillingwellservice/"
  WellBoreHostURL: "http://norcedrillingwellboreservice/"
  WellBoreArchitectureHostURL: "http://norcedrillingwellborearchitectureservice/"
  DrillStringHostURL: "http://norcedrillingdrillstringservice/"
  UnitConversionHostURL: "http://osdcunitconversionservice/"
  VerticalDepthHostURL: "http://norcedrillingverticaldepthservice/"
ingress:
  enabled: true
  className: public
  annotations:
    # nginx-ingress: Enable regex path matching for case-insensitive routing
    # This allows /ActiveVolume/webapp to match the same route as /activevolume/webapp
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: localhost
      paths:
        # Regex pattern matches /activevolume/webapp or /ActiveVolume/webapp, etc.
        - path: /(?i)activevolume/webapp
          pathType: ImplementationSpecific
    - host: dev.digiwells.no
      paths:
        - path: /(?i)activevolume/webapp
          pathType: ImplementationSpecific
    - host: app.digiwells.no
      paths:
        - path: /(?i)activevolume/webapp
          pathType: ImplementationSpecific
    - host: awe.web.intra.norceresearch.no
      paths:
        - path: /(?i)activevolume/webapp
          pathType: ImplementationSpecific
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
probes:
  enabled: false
